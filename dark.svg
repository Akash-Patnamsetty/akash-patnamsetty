<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
      .text-main { font-family: 'Inter', system-ui, -apple-system, sans-serif; fill: #F8FAFC; }
      .text-muted { font-family: 'Inter', system-ui, -apple-system, sans-serif; fill: #94A3B8; }
      .text-mono { font-family: 'Fira Code', monospace; }
      .bold { font-weight: 700; }
      .medium { font-weight: 500; }
      
      /* Interactive hover transitions */
      .skill-pill { transition: transform 0.2s ease, stroke 0.2s ease; cursor: pointer; }
      .skill-pill:hover { transform: scale(1.03); stroke: rgba(34, 211, 238, 0.6); }
      .social-icon { transition: transform 0.2s ease, stroke 0.2s ease; cursor: pointer; }
      .social-icon:hover { transform: scale(1.08); stroke: rgba(34, 211, 238, 0.6); }
    </style>

    <!-- Background Matrix & Accent Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#0B1329" />
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <radialGradient id="ambient-glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Canvas Background -->
  <rect width="920" height="460" rx="16" fill="url(#bg-grad)" />
  <rect width="920" height="460" rx="16" fill="url(#ambient-glow)" />

  <!-- Shimmer Border -->
  <rect x="1" y="1" width="918" height="458" rx="15" fill="none" stroke="url(#accent-grad)" stroke-width="1.2" opacity="0.4" />

  <!-- ==================== TERMINAL HEADER ==================== -->
  <g transform="translate(25, 20)">
    <!-- Mac Window Style Buttons -->
    <circle cx="0" cy="8" r="5.5" fill="#EF4444" />
    <circle cx="16" cy="8" r="5.5" fill="#F59E0B" />
    <circle cx="32" cy="8" r="5.5" fill="#10B981" />
    
    <!-- Environment Prompt Details -->
    <text x="65" y="12" class="text-mono medium" font-size="13" fill="#64748B">
      <tspan fill="#34D399">akash</tspan>@developer:~
    </text>

    <!-- Window Actions (Minimize/Maximize Visual Icons) -->
    <path d="M 835 8 L 847 8 M 853 4 L 861 12 M 861 4 L 853 12" stroke="#475569" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- ==================== LEFT COLUMN: INTRODUCTION & BIO ==================== -->
  <g transform="translate(45, 75)">
    <!-- Greeting -->
    <text x="0" y="20" class="text-main bold" font-size="18">Hi 👋</text>
    
    <!-- Title Name -->
    <text x="0" y="58" class="text-main bold" font-size="34">
      I'm <tspan fill="url(#accent-grad)">Akash Patnamsetty</tspan>
    </text>
    
    <!-- Core Stack Typing Display Line -->
    <g transform="translate(0, 96)">
      <text x="0" y="0" class="text-mono bold" font-size="20" fill="#38BDF8">
        <tspan>Full Stack Developer</tspan>
      </text>
      <!-- Blinking block cursor -->
      <rect x="235" y="-17" width="9" height="20" fill="#38BDF8">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Meta Details Informational Grid -->
    <g transform="translate(0, 145)">
      <!-- Location -->
      <g transform="translate(0, 0)">
        <text x="0" y="0" class="text-muted text-mono" font-size="14">📍 Location</text>
        <text x="130" y="0" class="text-main" font-size="14">&gt; Hyderabad, India</text>
      </g>
      
      <!-- Education -->
      <g transform="translate(0, 28)">
        <text x="0" y="0" class="text-muted text-mono" font-size="14">🎓 Education</text>
        <text x="130" y="0" class="text-main" font-size="14">&gt; B.Tech CSE @ Sri Mittapalli College of Engineering</text>
      </g>

      <!-- Focus -->
      <g transform="translate(0, 56)">
        <text x="0" y="0" class="text-muted text-mono" font-size="14">🎯 Current Focus</text>
        <text x="130" y="0" class="text-main" font-size="14">&gt; Building scalable web apps &amp; exploring AI/ML</text>
      </g>

      <!-- Portfolio -->
      <g transform="translate(0, 84)">
        <text x="0" y="0" class="text-muted text-mono" font-size="14">🌐 Portfolio</text>
        <text x="130" y="0" class="text-main" font-size="14" fill="#22D3EE">&gt; akashpatnamsetty.dev</text>
      </g>

      <!-- Contact Email -->
      <g transform="translate(0, 112)">
        <text x="0" y="0" class="text-muted text-mono" font-size="14">✉️ Email</text>
        <text x="130" y="0" class="text-main" font-size="14" fill="#34D399">&gt; akashpatnamsetty@gmail.com</text>
      </g>
    </g>

    <!-- Active Terminal Prompt Status Line -->
    <text x="0" y="305" class="text-mono bold" font-size="18" fill="#34D399">&gt; _</text>
  </g>

  <!-- Vertical Divider Separator Layout Layer -->
  <line x1="520" y1="75" x2="520" y2="390" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />

  <!-- ==================== RIGHT COLUMN: SKILLS & CONNECTIONS ==================== -->
  <!-- Skills Section Block -->
  <g transform="translate(550, 75)">
    <text x="0" y="20" class="text-mono text-muted" font-size="13" letter-spacing="0.5">// Skills</text>
    
    <g transform="translate(0, 35)">
      <!-- Row 1 Badges -->
      <g class="skill-pill" transform="translate(0, 0)">
        <rect width="78" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="39" y="19" class="text-main medium" font-size="12" text-anchor="middle">React</text>
      </g>
      <g class="skill-pill" transform="translate(86, 0)">
        <rect width="88" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="44" y="19" class="text-main medium" font-size="12" text-anchor="middle">▲ Next.js</text>
      </g>
      <g class="skill-pill" transform="translate(182, 0)">
        <rect width="88" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="44" y="19" class="text-main medium" font-size="12" text-anchor="middle">Node.js</text>
      </g>
      
      <!-- Row 2 Badges -->
      <g class="skill-pill" transform="translate(0, 40)">
        <rect width="100" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="50" y="19" class="text-main medium" font-size="12" text-anchor="middle">TypeScript</text>
      </g>
      <g class="skill-pill" transform="translate(108, 40)">
        <rect width="86" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="43" y="19" class="text-main medium" font-size="12" text-anchor="middle">Tailwind</text>
      </g>
      <g class="skill-pill" transform="translate(202, 40)">
        <rect width="78" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="39" y="19" class="text-main medium" font-size="12" text-anchor="middle">Python</text>
      </g>

      <!-- Row 3 Badges -->
      <g class="skill-pill" transform="translate(0, 80)">
        <rect width="90" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="45" y="19" class="text-main medium" font-size="12" text-anchor="middle">Postgres</text>
      </g>
      <g class="skill-pill" transform="translate(98, 80)">
        <rect width="66" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="33" y="19" class="text-main medium" font-size="12" text-anchor="middle">AWS</text>
      </g>
      <g class="skill-pill" transform="translate(172, 80)">
        <rect width="82" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="41" y="19" class="text-main medium" font-size="12" text-anchor="middle">Docker</text>
      </g>

      <!-- Row 4 Badges -->
      <g class="skill-pill" transform="translate(0, 120)">
        <rect width="60" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="30" y="19" class="text-main medium" font-size="12" text-anchor="middle">Git</text>
      </g>
      <g class="skill-pill" transform="translate(68, 120)">
        <rect width="76" height="30" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <text x="38" y="19" class="text-main medium" font-size="12" text-anchor="middle">Figma</text>
      </g>
    </g>
  </g>

  <!-- Connect / Social Icons Section Block -->
  <g transform="translate(550, 285)">
    <text x="0" y="20" class="text-mono text-muted" font-size="13" letter-spacing="0.5">// Connect</text>
    
    <g transform="translate(0, 35)">
      <!-- GitHub Icon Link Pill -->
      <g class="social-icon" transform="translate(0, 0)">
        <rect width="36" height="36" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <path d="M18 5c-4.42 0-8 3.58-8 8 0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38v-1.35c-2.22.48-2.69-1.07-2.69-1.07-.36-.92-.88-1.17-.88-1.17-.72-.5.06-.49.06-.49.8.06 1.22.82 1.22.82.71 1.22 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2 1.02.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-1.02 2.2-1.02.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.19c0 .22.15.46.55.38C23.71 19.53 26 16.54 26 13c0-4.42-3.58-8-8-8z" fill="#F8FAFC" transform="translate(0,0) scale(1)"/>
      </g>
      
      <!-- LinkedIn Icon Link Pill -->
      <g class="social-icon" transform="translate(48, 0)">
        <rect width="36" height="36" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" fill="#F8FAFC" transform="translate(6,6) scale(0.5)"/>
      </g>

      <!-- Twitter / X Icon Link Pill -->
      <g class="social-icon" transform="translate(96, 0)">
        <rect width="36" height="36" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#F8FAFC" transform="translate(6,6) scale(0.48)"/>
      </g>

      <!-- Global Link Web Pill -->
      <g class="social-icon" transform="translate(144, 0)">
        <rect width="36" height="36" rx="8" fill="#0F172A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="#F8FAFC" transform="translate(6,6) scale(0.5)"/>
      </g>
    </g>
  </g>
</svg>
